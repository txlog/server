<!doctype html>
<html lang="en" data-mode="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ .title }}</title>
  <link rel="icon" href="/images/favicon.ico">
  <link rel="shortcut icon" href="/images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="font-sans antialiased min-h-screen flex items-center justify-center bg-kumo-canvas text-kumo-default">
  <div class="w-full max-w-md mx-auto px-4 py-8">
    <div class="text-center mb-6">
      <a href="/"><img src="/images/logbook.png" height="100" width="100" alt="Txlog Server" class="inline-block"></a>
    </div>
    <div class="bg-kumo-control rounded-2xl shadow-sm border border-kumo-line p-8">
      <h2 class="font-semibold text-2xl text-center mb-6 text-kumo-default">Login to your account</h2>

      <div id="error-container">
        <script>
          var urlParams = new URLSearchParams(window.location.search);
          var error = urlParams.get('error');
          if (error) {
            var errorMessage = 'An error occurred during authentication.';
            var errorTitle = 'Authentication Error';
            switch (error) {
              case 'auth_failed': errorMessage = 'Authentication failed. Please check your credentials and try again.'; break;
              case 'invalid_state': errorMessage = 'Invalid request state. Please try again.'; break;
              case 'token_exchange_failed': errorMessage = 'Failed to exchange authorization code.'; break;
              case 'id_token_missing': errorMessage = 'ID token is missing from the response.'; break;
              case 'id_token_invalid': errorMessage = 'ID token verification failed.'; break;
              case 'user_creation_failed': errorMessage = 'Failed to create or update user account.'; break;
              case 'account_disabled': errorMessage = 'Your account has been disabled. Please contact an administrator.'; break;
              case 'session_creation_failed': errorMessage = 'Failed to create user session.'; break;
              case 'invalid_credentials': errorMessage = 'Invalid username or password.'; break;
              case 'user_not_found': errorMessage = 'User not found in the directory. Please check your username.'; break;
              case 'unauthorized_group': errorMessage = 'You are not authorized to access this system. Please contact an administrator.'; break;
              case 'ldap_connection_error': errorTitle = 'LDAP Connection Error'; errorMessage = 'Unable to connect to the authentication server. Please contact an administrator.'; break;
              case 'ldap_bind_error': errorTitle = 'LDAP Configuration Error'; errorMessage = 'Authentication service is misconfigured. Please contact an administrator to check the service account settings.'; break;
              case 'ldap_config_error': errorTitle = 'LDAP Configuration Error'; errorMessage = 'Authentication service has a configuration issue. Please contact an administrator to verify the directory settings.'; break;
            }
            document.getElementById('error-container').innerHTML =
              '<div data-kumo-component="Banner" class="mb-4 rounded-lg border border-kumo-danger/20 bg-kumo-danger/5 px-4 py-3 text-sm">' +
                '<div class="flex items-start gap-3">' +
                  '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256" class="shrink-0 text-kumo-danger mt-0.5">' +
                    '<path d="M236.8,188.09L149.35,36.22h0a24.76,24.76,0,0,0-42.7,0L19.2,188.09a23.51,23.51,0,0,0,0,23.72A24.35,24.35,0,0,0,40.55,224h174.9a24.35,24.35,0,0,0,21.33-12.19A23.51,23.51,0,0,0,236.8,188.09ZM222.93,203.8a8.5,8.5,0,0,1-7.48,4.2H40.55a8.5,8.5,0,0,1-7.48-4.2,7.59,7.59,0,0,1,0-7.72L120.52,44.21a8.75,8.75,0,0,1,15,0l87.45,151.87A7.59,7.59,0,0,1,222.93,203.8ZM120,104v40a8,8,0,0,0,16,0V104a8,8,0,0,0-16,0Zm20,80a12,12,0,1,1-12-12A12,12,0,0,1,140,184Z"></path>' +
                  '</svg>' +
                  '<div>' +
                    '<p class="font-medium text-kumo-danger">' + errorTitle + '</p>' +
                    '<p class="text-kumo-subtle mt-1">' + errorMessage + '</p>' +
                  '</div>' +
                '</div>' +
              '</div>';
          }
        </script>
      </div>

      {{ if .ldap_enabled }}
      <form action="/auth/ldap/login" method="post" autocomplete="off" novalidate>
        <div class="mb-4">
          <label class="font-medium text-sm pl-1 block mb-1.5 text-kumo-default">Username</label>
          <input data-kumo-component="Input" type="text" name="username" placeholder="john.doe" autocomplete="off" required
            class="w-full rounded-lg border border-kumo-line bg-kumo-control px-3 py-2 text-kumo-default placeholder:text-kumo-muted text-sm focus:outline-none focus:ring-2 focus:ring-kumo-brand transition-colors">
        </div>
        <div class="mb-4">
          <label class="font-medium text-sm pl-1 block mb-1.5 text-kumo-default">Password</label>
          <input data-kumo-component="Input" type="password" name="password" placeholder="**********" autocomplete="off" required
            class="w-full rounded-lg border border-kumo-line bg-kumo-control px-3 py-2 text-kumo-default placeholder:text-kumo-muted text-sm focus:outline-none focus:ring-2 focus:ring-kumo-brand transition-colors">
        </div>
        <button data-kumo-component="Button" type="submit"
          class="w-full group flex shrink-0 font-medium select-none border-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-kumo-brand cursor-pointer gap-1.5 rounded-lg text-base items-center justify-center px-4 py-2.5 text-white bg-kumo-brand hover:bg-kumo-brand/90 shadow-sm transition-colors mt-2">
          Sign in
        </button>
      </form>
      {{ end }}

      {{ if and .oidc_enabled .ldap_enabled }}
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-kumo-line"></div>
        <span class="text-sm text-kumo-muted font-medium">or</span>
        <div class="flex-1 h-px bg-kumo-line"></div>
      </div>
      {{ end }}

      {{ if .oidc_enabled }}
      <form action="/auth/login" method="post" autocomplete="off" novalidate>
        <button data-kumo-component="Button" type="submit"
          class="w-full group flex shrink-0 font-medium select-none focus:outline-none focus-visible:ring-2 focus-visible:ring-kumo-brand cursor-pointer gap-2 rounded-lg text-base items-center justify-center px-4 py-2.5 text-kumo-default bg-kumo-control border border-kumo-line hover:bg-kumo-tint shadow-sm transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
            <path d="M222.14,105.85l-86.4,115.2a16,16,0,0,1-25.6,0L24,105.85a15.82,15.82,0,0,1,1.52-20.91l88.2-80.19a16,16,0,0,1,21.64,0l88.21,80.19A15.82,15.82,0,0,1,222.14,105.85ZM124.4,26.55l-88.16,80.14L128,228.92l91.73-122.25-88.13-80.12A3.8,3.8,0,0,0,124.4,26.55ZM175,99l-58,58a8.21,8.21,0,0,1-11.45,0L89,140a8,8,0,1,1,11.31-11.31l11.41,11.41L163.66,87.66a8,8,0,0,1,11.31,11.31Z"></path>
          </svg>
          Login with SSO
        </button>
      </form>
      {{ end }}
    </div>
  </div>
</body>

</html>
